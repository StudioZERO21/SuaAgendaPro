# nginx/sites/suaagendapro-init.conf
# USAR APENAS NO PRIMEIRO DEPLOY — antes de emitir o certificado SSL.
# Após emitir o SSL com certbot, remova este arquivo e use suaagendapro.conf.
#
# Passos:
#   1. Copie este arquivo para suaagendapro.conf (ou aponte o docker-compose para ele)
#   2. docker-compose up -d
#   3. certbot certonly --webroot -w /var/www/certbot -d suaagenda.pro -d www.suaagenda.pro -d app.suaagenda.pro -d super.suaagenda.pro
#   4. Substitua por suaagendapro.conf (com SSL) e reinicie: docker-compose restart nginx

server {
    listen 80;
    server_name suaagenda.pro www.suaagenda.pro app.suaagenda.pro super.suaagenda.pro;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Proxy para o app (HTTP sem redirect enquanto cert não existe)
    location / {
        proxy_pass         http://app:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
