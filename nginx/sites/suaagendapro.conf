# Nginx — suaAgendaPro
# suaagenda.pro       → site público
# app.suaagenda.pro   → app mobile
# super.suaagenda.pro → super admin (IP whitelist)

# ─── Rate limiting ──────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=global:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=admin:10m  rate=5r/s;
limit_req_zone $binary_remote_addr zone=login:10m  rate=5r/m;

# ─── IPs autorizados para o super admin ─────────────────────────────────────
# Adicione seu IP fixo abaixo. Em desenvolvimento, mantenha 0.0.0.0/0
geo $admin_allowed {
    default      0;
    127.0.0.1    1;
    # SEU_IP_FIXO 1;
    # Ex: 177.100.200.30 1;
}

# ─── HTTP → HTTPS ────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name suaagenda.pro www.suaagenda.pro app.suaagenda.pro super.suaagenda.pro;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# ─── Site público — suaagenda.pro ────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name suaagenda.pro www.suaagenda.pro;

    ssl_certificate     /etc/letsencrypt/live/suaagenda.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/suaagenda.pro/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    limit_req zone=global burst=40 nodelay;

    location / {
        proxy_pass         http://app:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}

# ─── App — app.suaagenda.pro ─────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name app.suaagenda.pro;

    ssl_certificate     /etc/letsencrypt/live/suaagenda.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/suaagenda.pro/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    limit_req zone=global burst=40 nodelay;

    # Rate limit específico para login
    location /login {
        limit_req zone=login burst=5 nodelay;
        proxy_pass         http://app:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass         http://app:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ─── Super Admin — super.suaagenda.pro ───────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name super.suaagenda.pro;

    ssl_certificate     /etc/letsencrypt/live/suaagenda.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/suaagenda.pro/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;

    # IP whitelist — descomente e adicione seu IP para bloquear acessos externos
    # if ($admin_allowed = 0) { return 403; }

    limit_req zone=admin burst=10 nodelay;

    location / {
        proxy_pass         http://app:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
