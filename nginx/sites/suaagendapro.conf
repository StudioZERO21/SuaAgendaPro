# ETAPA 9/10 — Nginx sites
# suaagendapro.com   → site público (responsivo)
# app.suaagendapro.com → app mobile-only (após produção)
# admin.suaagendapro.com → super admin (IP whitelist + desktop)

# ─── Headers de segurança reutilizáveis ─────────────────────────────────────
map $host $csp_header {
    default "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.asaas.com https://sandbox.asaas.com;";
}

# ─── IPs liberados para o admin (ETAPA 10) ──────────────────────────────────
# TODO: substituir pelos IPs reais autorizados
geo $admin_allowed {
    default         0;
    127.0.0.1       1;    # localhost (testes)
    # 177.x.x.x    1;    # seu IP fixo
}

# ─── Site público — suaagendapro.com ────────────────────────────────────────
server {
    listen 80;
    server_name suaagendapro.com www.suaagendapro.com;
    return 301 https://suaagendapro.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name suaagendapro.com www.suaagendapro.com;

    ssl_certificate     /etc/letsencrypt/live/suaagendapro.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/suaagendapro.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy $csp_header always;

    limit_req zone=global burst=40 nodelay;

    location / {
        proxy_pass         http://app:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ─── App mobile — app.suaagendapro.com (ETAPA 10) ───────────────────────────
server {
    listen 443 ssl http2;
    server_name app.suaagendapro.com;

    ssl_certificate     /etc/letsencrypt/live/suaagendapro.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/suaagendapro.com/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    limit_req zone=global burst=40 nodelay;

    # TODO (Etapa 10 — ATIVAR EM PRODUÇÃO):
    # Detectar desktop e redirecionar para página "use no celular"
    # set $is_mobile 0;
    # if ($http_user_agent ~* "(Android|iPhone|iPad|Mobile)") { set $is_mobile 1; }
    # if ($is_mobile = 0) { return 302 https://suaagendapro.com/use-no-celular; }

    location / {
        proxy_pass         http://app:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ─── Super Admin — admin.suaagendapro.com (ETAPA 10) ────────────────────────
server {
    listen 443 ssl http2;
    server_name admin.suaagendapro.com;

    ssl_certificate     /etc/letsencrypt/live/suaagendapro.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/suaagendapro.com/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;

    # IP whitelist — bloquear todos exceto autorizados
    if ($admin_allowed = 0) {
        return 403;
    }

    # Rate limiting agressivo para admin
    limit_req zone=admin burst=10 nodelay;

    location / {
        proxy_pass         http://app:8080/super;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
