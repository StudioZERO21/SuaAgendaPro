version: '3.8'

# ETAPA 9 — Docker Compose para VPS
# Nginx como reverse proxy + app TanStack Start SSR

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: suaagendapro-app
    restart: unless-stopped
    expose:
      - "8080"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
    networks:
      - suaagendapro-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/api/health',(r)=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:alpine
    container_name: suaagendapro-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      app:
        condition: service_healthy
    networks:
      - suaagendapro-net

volumes:
  nginx-cache:

networks:
  suaagendapro-net:
    driver: bridge

# =============================================================================
# COMO USAR NA VPS:
# =============================================================================
#
# 1. Copiar .env.production.example → .env.production e preencher
# 2. docker-compose up -d --build
# 3. Ver logs: docker-compose logs -f app
# 4. Parar: docker-compose down
#
