# docker-compose.yml — SuaAgenda.Pro (produção com Traefik)
#
# O Traefik já está rodando no VPS e gerencia SSL/HTTPS automaticamente.
# NÃO use este arquivo com o gerenciador visual da Hostinger.
# Use via Terminal: bash deploy.sh
#
# Variáveis obrigatórias em .env.production (ver .env.production.example)

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: suaagendapro-app:latest
    container_name: suaagendapro-app
    restart: unless-stopped
    expose:
      - "8080"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.suaagendapro.rule=Host(`suaagenda.pro`) || Host(`www.suaagenda.pro`) || Host(`app.suaagenda.pro`) || Host(`super.suaagenda.pro`)"
      - "traefik.http.routers.suaagendapro.entrypoints=websecure"
      - "traefik.http.routers.suaagendapro.tls.certresolver=letsencrypt"
      - "traefik.http.services.suaagendapro.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/api/health',(r)=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
